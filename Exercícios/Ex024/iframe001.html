<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Estudos de iframe</title>
    <style>
      iframe {
        height: 400px;
        width: 400px;
        border: 5px solid red;
      }
    </style>
  </head>
  <body>
    <h1>Testando o uso de iframe</h1>
    <p>
      Acessando o site da

      <iframe
        src="https://cognull.vercel.app/"
        frameborder="0"
        height="500"
        scolling="no"
      >
        <a href="https://cognull.vercel.app/" target="_blank"
          >Site da Cognull</a
        >
      </iframe>

      para aprender a programar.
    </p>

    <p>
      O repositório do Guanabara

      <iframe src="https://gustavoguanabara.github.io" frameborder="0">
        no <a href="https://gustavoguanabara.github.io">GitHub</a></iframe
      >
      também é muito legal.
    </p>
  </body>
</html>
