<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Adicionando conteúdos</title>
  </head>
  <body>
    <h1>Conteúdo dentro de iframes</h1>
    <p>
      Lorem ipsum dolor sit amet consectetur adipisicing elit. Repellendus
      molestiae maxime fuga deleniti facere. Inventore, obcaecati explicabo
      laudantium sequi aperiam reiciendis atque unde quia temporibus nulla nihil
      ad at magnam?
    </p>
    <h2>Vídeos</h2>
    <div style="padding: 56.25% 0 0 0; position: relative">
      <iframe
        src="https://player.vimeo.com/video/1055537544?badge=0&amp;autopause=0&amp;player_id=0&amp;app_id=58479"
        frameborder="0"
        allow="
          autoplay;
          fullscreen;
          picture-in-picture;
          clipboard-write;
          encrypted-media;
          web-share;
        "
        referrerpolicy="strict-origin-when-cross-origin"
        style="position: absolute; top: 0; left: 0; width: 100%; height: 100%"
        title="Peter Hair (Adult Swim)"
      ></iframe>
    </div>
    <script src="https://player.vimeo.com/api/player.js"></script>

    <h2>Mapas do Google</h2>
    <iframe
      src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d4660.02587831089!2d-47.96797502386103!3d-19.737989032359923!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x94bad10b75e64401%3A0x91dcb4cbe1210e04!2sAlameda%20Cobre%2C%20282%20-%20Grande%20Horizonte%2C%20Uberaba%20-%20MG%2C%2038057-100!5e1!3m2!1spt-BR!2sbr!4v1775819221189!5m2!1spt-BR!2sbr"
      width="600"
      height="450"
      style="border: 0"
      allowfullscreen=""
      loading="lazy"
      referrerpolicy="no-referrer-when-downgrade"
    ></iframe>

    <h2>Mapas do Waze</h2>
    <iframe
      src="https://embed.waze.com/iframe?zoom=16&lat=-19.737994&lon=-47.965400&ct=livemap"
      width="600"
      height="450"
      allowfullscreen
    ></iframe>
  </body>
</html>
