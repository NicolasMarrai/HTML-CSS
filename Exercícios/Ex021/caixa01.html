<!DOCTYPE html>
<html lang="ept-br>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Caixas</title>
</head>
<style>
    h1 { /* Box-Level */
        background-color: lightgray;
        width: 300px;
        height: 300px;
        border: 10px solid rgb(177, 20, 20);
        padding: 10px;
        margin: 20px 20px 40px 20px;
        outline: 5px dashed rgb(20, 51, 177);
    }

    a { /* Inline-Level */
        background-color: lightgray;
        width: 300px;
        height: 300px;
        border: 10px solid rgb(177, 20, 20);
        padding: 10px;
        margin: 20px 20px 40px 20px;
        outline: 5px dashed rgb(20, 51, 177);
    }
</style>
<body>
    <h1>Exemplo de caixa Box-Level</h1>
    <p>Paragrafos tambem são exemplos de box-level, mas os <a href="#">links são exemplos de caixas inline-level</a>. Vamos ver como tudo isso funciona.</p>
</body>
</html>
