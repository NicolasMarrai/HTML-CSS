<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exemplo de Hover</title>
  </head>

  <style>
    body {
      font-family: "Franklin Gothic Medium", "Arial Narrow", Arial, sans-serif;
    }

    div > p {
      display: none;
    }

    div:hover > p {
      display: block;
      background-color: lightseagreen;
      width: 300px;
    }

    div:hover {
      color: red;
    }
  </style>
  <body>
    <h1>Exemplo de Hover</h1>
    <p>Passe o mouse sobre o texto abaixo para ver o efeito de hover:</p>
    <div>
      Passe o mouse aqui!
      <p>Texto escondido....</p>
    </div>
  </body>
</html>
