<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formulário</title>
  </head>
  <body>
    <h1>Exemplo de Formulário</h1>
    <form action="" method="get" autocomplete="on">
      <fieldset>
        <legend>Sexo</legend>

        <input type="radio" name="sexo" id="imasc" value="M" />
        <label for="imasc">Masculino</label><br />

        <input type="radio" name="sexo" id="ifemi" value="F" />
        <label for="ifemi">Feminino</label>
      </fieldset>

      <fieldset>
        <legend>Esporte Favorito</legend>

        <input type="checkbox" name="fut" id="ifut" />
        <label for="ifut">Futebol</label><br />

        <input type="checkbox" name="basq" id="ibasq" />
        <label for="ibasq">Basquete</label><br />

        <input type="checkbox" name="tenis" id="itenis" />
        <label for="itenis">Tenis</label><br />

        <input type="checkbox" name="nat" id="inat" />
        <label for="inat">Natação</label><br />
      </fieldset>

      <p>
        <input type="submit" value="Enviar" />
      </p>
    </form>
  </body>
</html>
