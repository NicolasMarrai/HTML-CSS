<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formulário</title>
  </head>
  <body>
    <h1>Exemplos de Formulários</h1>
    <form action="" method="post" autocomplete="on">
      <p>
        <label for="iestado">Estado</label>

        <select name="Estado" id="iestado">
          <option value="" selected>--- Escolha ---</option>
          <optgroup label="Região Sudeste">
            <option value="MG">Minas Gerais</option>
            <option value="RJ">Rio de Janeiro</option>
            <option value="SP">São Paulo</option>
          </optgroup>

          <optgroup label="Região Nordeste">
            <option value="MA">Maranhão</option>
            <option value="PE">Pernambuco</option>
            <option value="RN">Rio Grande do Norte</option>
          </optgroup>
        </select>
      </p>

      <p>
        <label for="iprof">Profissão:</label>
        <input type="text" name="prof" id="iprof" list="listprof" />
        <datalist id="listprof">
          <option>Administrador</option>
          <option>Professor</option>
          <option>Desenvolvedor</option>
          <option>Contador</option>
        </datalist>
      </p>

      <p>
        <label for="imsg">Mensagem: </label>
        <textarea name="msg" id="imsg"></textarea>
      </p>

      <p>
        <input type="submit" value="Enviar" />
        <input type="reset" name="" id="" value="Limpar" />
      </p>
    </form>
  </body>
</html>
