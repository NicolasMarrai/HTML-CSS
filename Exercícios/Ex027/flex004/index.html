<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />

    <title>Document</title>

        display: flex;

        align-items: center;

        border: 1px solid black;
        text-align: center;
      }

    <div class="conteiner">
      <div class="item">A</div>
      <div class="item">B</div>
      <div class="item">C</div>
      <div class="item">D</div>
      <div class="item">E</div>
      <div class="item">F</div>
      <div class="item">G</div>
    </div>
  </body>
</html>
