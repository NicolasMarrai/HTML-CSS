<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .conteiner {
        background-color: rgba(128, 198, 236, 0.944);
        border: 1px solid black;
        display: flex;
        flex-flow: row nowrap;
      }

      .item {
        background-color: rgb(238, 205, 205);
        border: 1px solid black;
        text-align: center;
        flex-basis: 200px;
      }

      div#cxA {
        flex-shrink: 1;
        flex-grow: 1;
      }

      div#cxB {
        flex-shrink: 2;
        flex-grow: 2;
      }

      div#cxC {
        flex-shrink: 1;
        flex-grow: 1;
      }
    </style>
  </head>
  <body>
    <div class="conteiner">
      <div class="item" id="cxA">A</div>
      <div class="item" id="cxB">B</div>
      <div class="item" id="cxC">C</div>
    </div>
  </body>
</html>
